<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛷️ 家族日本滑雪觀光行程</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 p-6">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-3xl font-extrabold text-blue-700 mb-6 text-center">🇯🇵 日本滑雪之旅</h1>
        <div class="bg-blue-100 p-4 rounded-lg mb-4">
            <p class="font-bold text-blue-800 text-center">🎉 恭喜！網頁已成功連線！</p>
        </div>
        <ul class="space-y-4">
            <li class="flex items-center space-x-3">
                <span class="text-2xl">🏨</span>
                <div>
                    <p class="font-bold">第一天：抵達飯店</p>
                    <p class="text-sm text-gray-500">機場專車接送至雪場</p>
                </div>
            </li>
            <li class="flex items-center space-x-3">
                <span class="text-2xl">🎿</span>
                <div>
                    <p class="font-bold">第二天：全天滑雪</p>
                    <p class="text-sm text-gray-500">專業教練指導教學</p>
                </div>
            </li>
            <li class="flex items-center space-x-3">
                <span class="text-2xl">♨️</span>
                <div>
                    <p class="font-bold">第三天：溫泉美食</p>
                    <p class="text-sm text-gray-500">放鬆身心享受日式料理</p>
                </div>
            </li>
        </ul>
        <p class="mt-8 text-center text-gray-400 text-xs">這是您的專屬 GitHub Pages 網站</p>
    </div>
</body>
</html>
