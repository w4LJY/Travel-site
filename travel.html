                        { text: "大阪烤肉・荷爾蒙 二子 (下北澤店)：桌邊代烤，必點「滿出來的牛小排」。", pay: ["現金", "信用卡", "PayPay", "西瓜卡"], location: "大阪焼肉・ホルモン ふたご 下北沢店" },
                        { text: "炭火燒肉 ホルモン劇場 den：黑毛和牛，排煙佳座位寬敞，適合家庭。", pay: ["現金", "信用卡", "PayPay"], location: "炭火焼肉 ホルモン劇場 den" },
                        { text: "燒肉屋 YAZAWA：高 CP 值嚴選黑毛和牛，肉質鮮甜份量足。", pay: ["現金", "信用卡", "PayPay"], location: "焼肉屋 YAZAWA 下北沢店" },
                        { text: "【晚餐備選 (若不想吃燒肉)】", isSubtitle: true },
                        { text: "Rojiura Curry SAMURAI：知名北海道湯咖哩，蔬菜滿滿。", pay: ["現金", "信用卡", "PayPay"], location: "Rojiura Curry SAMURAI. 下北沢店" },
                        { text: "Shirube (汁べゑ) 下北澤店：隱蔽居酒屋，炙燒鯖魚必點 (可能需預約)。", pay: ["現金", "信用卡", "PayPay"], location: "汁べゑ 下北沢店" }
                      ]
                    }
                ]
            },
            {
                id: 6, day: "第六天", date: "3/4 (三)", title: "🛍️ 澀谷血拚與滿載而歸", mapQuery: "Shibuya Station",
                events: [
                    { time: "08:00 - 08:30", title: "起床與 Checkout", location: "Shimokitazawa", icon: "🛏️", details: [] },
                    { time: "09:00", title: "前往澀谷", location: "Shibuya Station", icon: "🚆", type: "transport", transport: "京王井之頭線，急行約4分，各停約6分", details: [{ pay: ["西瓜卡", "現金"] }] },
                    { time: "09:10", title: "抵達澀谷車站，尋找置物櫃", location: "Shibuya Station", icon: "🧳", details: [{ text: "澀谷主要是購物行程，可以考慮帶著行李箱逛", pay: ["西瓜卡", "現金"] }] },
                    { time: "09:20 - 10:00", title: "🌞 晨間打卡與24H爆買", location: "Shibuya Scramble Crossing", icon: "📸",
                      details: [
                        { text: "澀谷十字路口、忠犬八公像：趁早上人潮還沒擠爆前拍照。", location: "Shibuya Scramble Crossing" },
                        { text: "MEGA 唐吉訶德 澀谷本店 (24H)：主打免稅零食、藥妝。必買特殊口味 KitKat、面膜。", pay: ["現金", "信用卡", "PayPay", "西瓜卡"], location: "MEGA Don Quijote Shibuya" }
                      ]
                    },
                    { time: "10:00 - 11:00", title: "🕙 搶購熱門伴手禮與電器", location: "Shibuya Scramble Square", icon: "🛍️",
                      details: [
                        { text: "SHIBUYA SKY：無死角俯瞰東京。(極熱門，強烈建議提早線上購票)", pay: ["線上購票", "信用卡", "PayPay"], location: "SHIBUYA SKY" },
                        { text: "澀谷 Scramble Square 1F 艾許奶油餅乾：鐵盒奶油餅乾極易完售，10點開門要衝。", pay: ["信用卡", "西瓜卡", "現金"], location: "ÉCHIRÉ PÂTISSERIE AU BEURRE Shibuya" },
                        { text: "澀谷 Scramble Square 10F Hands (原台隆)：文具、居家小物。", pay: ["信用卡", "西瓜卡", "現金"], location: "Hands Shibuya Scramble Square" },
                        { text: "Bic Camera / LABI 澀谷：Panasonic 吹風機、保溫瓶、鋼彈模型。", pay: ["信用卡", "現金", "PayPay", "西瓜卡"], location: "Bic Camera Shibuya Hachikoguchi" },
                        { text: "Mont-bell 澀谷店 (10:30開門)：高CP值機能服飾。必買 GORE-TEX 外套、超輕量折疊傘。", pay: ["信用卡", "現金", "PayPay", "西瓜卡"], location: "Mont-bell Shibuya" },
                        { text: "西武百貨 (SEIBU)：專櫃美妝、精品、B1高級伴手禮。", pay: ["信用卡", "現金", "PayPay"], location: "Seibu Shibuya" }
                      ]
                    },
                    { time: "11:00 - 12:15", title: "🕚 次文化、文青雜貨", location: "Shibuya PARCO", icon: "🧸",
                      details: [
                        { text: "⚠️ 距離搭車僅剩1小時多，請挑重點逛" },
                        { text: "澀谷 PARCO (6F)：任天堂旗艦店、寶可夢中心、JUMP SHOP。", pay: ["信用卡", "現金", "PayPay", "西瓜卡"], location: "Nintendo TOKYO" },
                        { text: "澀谷 Loft：旗艦級文青雜貨、精美手帳本、富士山杯。", pay: ["信用卡", "現金", "PayPay", "西瓜卡"], location: "Shibuya Loft" },
                        { text: "宮下公園：頂樓與哆啦A夢合照，或 1F 澀谷橫丁感受氣氛。", pay: ["依店鋪不同"], location: "MIYASHITA PARK" },
                        { text: "澀谷 Hikarie：11F 有免費 Sky Lobby 觀景台看十字路口。", pay: ["信用卡", "現金", "西瓜卡"], location: "Shibuya Hikarie" }
                      ]
                    },
                    { time: "11:45 - 12:30", title: "🕛 極速午餐或外帶車上吃", location: "Shibuya Station", icon: "🍱",
                      details: [
                        { text: "【方案 A (連鎖快餐)】", isSubtitle: true },
                        { text: "Shake Shack 漢堡：出餐快。", pay: ["信用卡", "現金", "PayPay", "西瓜卡"], location: "Shake Shack Shibuya" },
                        { text: "松屋 / 吉野家 / すき家：點餐到吃完只要 15-20 分鐘。", pay: ["西瓜卡", "現金", "PayPay"], location: "Matsuya Shibuya" },
                        { text: "一蘭 / 阿夫利 AFURI：⚠️ 若排隊超過 10 分鐘請果斷放棄。", pay: ["現金", "西瓜卡", "信用卡"], location: "Ichiran Shibuya" },
                        { text: "【方案 B (極度推薦：買便當上車吃)】", isSubtitle: true },
                        { text: "把時間留給逛街！在 Scramble Square B2 或便利商店買日式鐵路便當 (駅弁)、豬排三明治，帶到 N'EX 享用。", pay: ["信用卡", "現金", "西瓜卡", "PayPay"], location: "Shibuya Scramble Square" }
                      ]
                    },
                    { time: "12:30", title: "領取行李，前往 JR 月台", location: "Shibuya Station", icon: "🧳", details: [] },
                    { time: "12:46", title: "搭乘 JR 成田特快 N'EX", location: "Shibuya Station", icon: "🚆", type: "transport", transport: "前往機場，車程約 1時14分", details: [{ text: "⚠️ 關鍵時間", pay: ["已購買"] }] },
                    { time: "14:00", title: "抵達成田機場第一航廈 T1", location: "Narita Airport Terminal 1", icon: "📍", type: "transport",
                      details: [
                        { text: "辦理報到、托運行李、安檢。" },
                        { text: "入關後做最後的免稅店採購（Tokyo Banana、Royce等）。", pay: ["現金", "信用卡", "PayPay", "西瓜卡"] }
                      ]
                    },
                    { time: "16:15 - 19:20", title: "搭機返台 (BR1197)", location: "Taoyuan International Airport", icon: "✈️", type: "transport", details: [{ text: "平安抵達桃園機場，結束美好的家族旅程！" }] }
                ]
            }
        ];

        // --- 輔助 UI 元件 ---
        const Badge = ({ type, text }) => {
            const styles = {
                '信用卡': 'bg-blue-100 text-blue-800 border-blue-200',
                '現金': 'bg-emerald-100 text-emerald-800 border-emerald-200',
                '西瓜卡': 'bg-teal-100 text-teal-800 border-teal-200',
                'PayPay': 'bg-rose-100 text-rose-800 border-rose-200',
                '已購買': 'bg-purple-100 text-purple-800 border-purple-200',
                '線上購票': 'bg-indigo-100 text-indigo-800 border-indigo-200'
            };
            const defaultStyle = 'bg-gray-100 text-gray-800 border-gray-200';
            const matchedStyle = styles[text] || defaultStyle;

            return (
                <span className={`inline-flex items-center px-2 py-0.5 rounded text-xs font-medium border ${matchedStyle} mr-1 mb-1 whitespace-nowrap shadow-sm`}>
                    {type === 'pay' && <span className="mr-1">💳</span>}
                    {text}
                </span>
            );
        };

        const DetailItem = ({ item, isSelectedMapLocation, onLocationClick }) => {
            if (item.isSubtitle) {
                return <li className="mt-4 mb-1 font-bold text-slate-700 text-sm border-b pb-1 border-slate-200">{item.text}</li>;
            }
            
            // 若該子項目有地點，渲染成可點擊的樣式
            const isClickable = !!item.location;
            const cardClasses = `mb-2 text-sm leading-relaxed p-3 rounded-lg shadow-sm border transition-colors ${
                isClickable ? 'cursor-pointer hover:border-blue-300 hover:shadow-md' : ''
            } ${
                isSelectedMapLocation ? 'bg-blue-50/70 border-blue-400 ring-1 ring-blue-200' : 'bg-white border-slate-100'
            }`;

            return (
                <li 
                    className={cardClasses}
                    onClick={() => isClickable && onLocationClick(item.location)}
                >
                    <div className="flex items-start justify-between">
                        <div className={`font-medium ${isSelectedMapLocation ? 'text-blue-800' : 'text-slate-800'}`}>
                            {item.text}
                        </div>
                        {isClickable && (
                            <div className="ml-2 text-blue-500 text-lg flex-shrink-0" title="點擊查看地圖">
                                📍
                            </div>
                        )}
                    </div>
                    {(item.price || item.wait || item.pay) && (
                        <div className="mt-2 flex flex-wrap gap-y-2 items-center text-xs">
                            {item.price && <span className="mr-3 font-semibold text-amber-600 bg-amber-50 px-2 py-1 rounded">💰 {item.price}</span>}
                            {item.wait && <span className="mr-3 font-semibold text-orange-600 bg-orange-50 px-2 py-1 rounded">⏳ {item.wait}</span>}
                            {item.pay && <div className="flex flex-wrap">{item.pay.map(p => <Badge key={p} type="pay" text={p} />)}</div>}
                        </div>
                    )}
                </li>
            );
        };

        // --- 主程式 ---
        const App = () => {
            const [activeDayIdx, setActiveDayIdx] = React.useState(0);
            const [expandedEventIdx, setExpandedEventIdx] = React.useState(null);
            // 新增：儲存被點擊的「子項目地點」
            const [activeSubLocation, setActiveSubLocation] = React.useState(null);

            const activeDay = itineraryData[activeDayIdx];
            
            // 地圖搜尋字串邏輯優先順序：1. 子項目地點 -> 2. 主行程地點 -> 3. 當天大區域
            const currentMapQuery = activeSubLocation 
                ? activeSubLocation
                : (expandedEventIdx !== null ? activeDay.events[expandedEventIdx].location : activeDay.mapQuery);

            // 地圖 URL
            const mapUrl = `https://maps.google.com/maps?q=${encodeURIComponent(currentMapQuery)}&t=&z=15&ie=UTF8&iwloc=&output=embed`;

            const handleDayChange = (idx) => {
                setActiveDayIdx(idx);
                setExpandedEventIdx(null);
                setActiveSubLocation(null); // 切換天數時重置地圖子項目
            };

            const toggleEvent = (idx) => {
                setExpandedEventIdx(prev => prev === idx ? null : idx);
                setActiveSubLocation(null); // 開關主項目時，重置子項目地圖，退回主地點
            };

            return (
                <div className="max-w-md mx-auto bg-slate-50 min-h-screen pb-10 shadow-xl relative">
                    {/* Header: 已移除標題，只保留天數按鈕 */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm pt-2">
                        {/* Day Tabs */}
                        <div className="flex overflow-x-auto no-scrollbar px-2 pb-3 snap-x">
                            {itineraryData.map((day, idx) => (
                                <button 
                                    key={day.id}
                                    onClick={() => handleDayChange(idx)}
                                    className={`snap-start whitespace-nowrap px-4 py-2 mx-1 rounded-full text-sm font-semibold transition-colors duration-200 ease-in-out ${
                                        activeDayIdx === idx 
                                        ? 'bg-blue-600 text-white shadow-md' 
                                        : 'bg-slate-100 text-slate-500 hover:bg-slate-200'
                                    }`}
                                >
                                    {day.date}
                                </button>
                            ))}
                        </div>
                    </header>

                    {/* Google Map Area */}
                    <div className="sticky top-[52px] z-10 w-full bg-slate-200 border-b border-slate-300 shadow-inner" style={{ height: '30vh' }}>
                        <iframe 
                            width="100%" 
                            height="100%" 
                            frameBorder="0" 
                            scrolling="no" 
                            marginHeight="0" 
                            marginWidth="0" 
                            src={mapUrl}
                            className="w-full h-full"
                            title="Google Map View"
                        ></iframe>
                        {/* Map Overlay Indicator */}
                        <div className="absolute bottom-2 left-2 bg-white/90 backdrop-blur px-2 py-1 rounded text-[10px] font-bold text-slate-600 shadow-sm border border-slate-200 pointer-events-none max-w-[80%] truncate">
                            📍 {currentMapQuery.split(',')[0]}
                        </div>
                    </div>

                    {/* Itinerary List */}
                    <div className="px-4 py-5">
                        <div className="mb-4">
                            <h2 className="text-xl font-extrabold text-slate-800">{activeDay.day}</h2>
                            <p className="text-sm font-medium text-blue-600 mt-1">{activeDay.title}</p>
                        </div>

                        <div className="relative border-l-2 border-blue-200 ml-3 pl-5 space-y-6">
                            {activeDay.events.map((event, idx) => {
                                const isExpanded = expandedEventIdx === idx;
                                const hasDetails = event.details && event.details.length > 0;
                                const isTransport = event.type === 'transport'; // 判斷是否為交通卡片

                                // 針對交通卡片調整基礎樣式
                                const baseCardBg = isTransport ? 'bg-blue-50' : 'bg-white';
                                const baseCardBorder = isTransport ? 'border-blue-400 border-2' : 'border-slate-200 border';
                                
                                // 展開時的強調樣式
                                const expandedBorder = isTransport 
                                    ? 'border-blue-500 ring-2 ring-blue-300' 
                                    : 'border-blue-400 ring-1 ring-blue-100';

                                return (
                                    <div key={idx} className="relative">
                                        {/* Timeline Dot */}
                                        <div className={`absolute -left-[29px] w-6 h-6 rounded-full flex items-center justify-center text-xs shadow-sm border-2 ${
                                            isExpanded 
                                            ? 'bg-blue-600 border-white text-white' 
                                            : (isTransport ? 'bg-blue-100 border-blue-400 text-blue-700' : 'bg-white border-blue-200 text-blue-500')
                                        }`}>
                                            {event.icon}
                                        </div>

                                        {/* Event Card */}
                                        <div 
                                            className={`${baseCardBg} rounded-xl shadow-sm transition-all duration-200 ${
                                                isExpanded 
                                                ? expandedBorder 
                                                : `${baseCardBorder} cursor-pointer hover:border-blue-300`
                                            }`}
                                        >
                                            {/* Card Header (Always visible) */}
                                            <div 
                                                className="p-3 flex justify-between items-start"
                                                onClick={() => hasDetails ? toggleEvent(idx) : (setExpandedEventIdx(idx), setActiveSubLocation(null))} 
                                            >
                                                <div className="pr-4">
                                                    <div className={`text-xs font-bold mb-1 font-mono inline-block px-1.5 py-0.5 rounded ${
                                                        isTransport ? 'bg-blue-200 text-blue-800' : 'bg-slate-100 text-slate-500'
                                                    }`}>
                                                        {event.time}
                                                    </div>
                                                    <h3 className={`text-base font-bold ${
                                                        isExpanded ? 'text-blue-700' : (isTransport ? 'text-blue-900' : 'text-slate-800')
                                                    }`}>
                                                        {event.title}
                                                    </h3>
                                                    {event.transport && (
                                                        <div className={`text-xs mt-1.5 flex items-start font-medium ${
                                                            isTransport ? 'text-blue-700' : 'text-slate-500'
                                                        }`}>
                                                            <span className="mr-1 mt-0.5">🚆</span>
                                                            <span>{event.transport}</span>
                                                        </div>
                                                    )}
                                                </div>
                                                {/* Expand Arrow */}
                                                {hasDetails && (
                                                    <button className={`mt-1 p-1 rounded-full ${isTransport ? 'bg-blue-100 text-blue-500' : 'bg-slate-50 text-slate-400'}`}>
                                                        <svg className={`w-5 h-5 transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                                                        </svg>
                                                    </button>
                                                )}
                                            </div>

                                            {/* Card Details (Expandable) */}
                                            {hasDetails && (
                                                <div className={`expand-transition ${isTransport ? 'bg-blue-50/50' : 'bg-slate-50/50'} rounded-b-xl ${
                                                    isExpanded ? 'max-h-[3000px] opacity-100 border-t border-slate-200/60' : 'max-h-0 opacity-0'
                                                }`}>
                                                    <div className="p-3">
                                                        <ul className="space-y-1">
                                                            {event.details.map((detail, dIdx) => (
                                                                <DetailItem 
                                                                    key={dIdx} 
                                                                    item={detail} 
                                                                    isSelectedMapLocation={activeSubLocation === detail.location}
                                                                    onLocationClick={(loc) => setActiveSubLocation(loc)}
                                                                />
                                                            ))}
                                                        </ul>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    
                    {/* Footer padding */}
                    <div className="h-10"></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
